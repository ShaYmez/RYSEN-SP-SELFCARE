name: Sync from RYSEN

on:
  workflow_dispatch:
    inputs:
      rysen_ref:
        description: RYSEN git ref (branch, tag, or SHA)
        required: false
        default: ipsc
  repository_dispatch:
    types: [rysen-selfcare-updated]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SP-SELFCARE
        uses: actions/checkout@v4

      - name: Resolve RYSEN ref
        id: ref
        run: |
          REF="${{ github.event.client_payload.ref }}"
          if [ -z "$REF" ]; then
            REF="${{ github.event.inputs.rysen_ref }}"
          fi
          if [ -z "$REF" ]; then
            REF="${{ vars.RYSEN_SYNC_REF }}"
          fi
          if [ -z "$REF" ]; then
            REF="ipsc"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Syncing from RYSEN ref: $REF"

      - name: Checkout RYSEN source
        uses: actions/checkout@v4
        with:
          repository: ShaYmez/RYSEN
          ref: ${{ steps.ref.outputs.ref }}
          path: rysen-src
          sparse-checkout: |
            hotspot_proxy_v2_sc.py
            proxy_db.py
            hotspot_proxy_v2_sc-SAMPLE.cfg
            tests/test_hotspot_proxy.py
          sparse-checkout-cone-mode: false

      - name: Copy synced files
        run: |
          mkdir -p sync tests
          cp rysen-src/hotspot_proxy_v2_sc.py sync/hotspot_proxy_v2.py
          cp rysen-src/proxy_db.py sync/proxy_db.py
          cp rysen-src/hotspot_proxy_v2_sc-SAMPLE.cfg sync/proxy-SAMPLE.cfg
          sed 's/hotspot_proxy_v2_sc/hotspot_proxy_v2/g' \
            rysen-src/tests/test_hotspot_proxy.py > tests/test_hotspot_proxy.py
          git -C rysen-src rev-parse HEAD > sync/.rysen-sha

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sync/hotspot_proxy_v2.py sync/proxy_db.py sync/proxy-SAMPLE.cfg sync/.rysen-sha tests/test_hotspot_proxy.py
          if git diff --staged --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          SHA=$(cat sync/.rysen-sha)
          git commit -m "sync: update from RYSEN @ ${SHA:0:7}"
          git push
